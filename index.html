<!DOCTYPE html>
<html>
<head>
  <title>Sidd Artifex</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }
    h1 { margin-top: 20px; }

    .gallery img {
      width: 250px;
      margin: 10px;
      border-radius: 10px;
    }

    button {
      padding: 12px 20px;
      background: #ff4d4d;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
    }

    /* Popup */
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .popup-content {
      background: white;
      color: black;
      padding: 20px;
      margin: 100px auto;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Sidd Artifex 🎨</h1>
<p>Custom Portrait Artist</p>

<button onclick="openPopup()">Order Your Portrait</button>

<div class="gallery">
  <img src="https://via.placeholder.com/250">
  <img src="https://via.placeholder.com/250">
  <img src="https://via.placeholder.com/250">
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Contact Me</h3>
    <p>Send your photo on WhatsApp</p>
    <a href="https://wa.me/8122676183">Chat Now</a>
    <br><br>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "block";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Sidd Artifex</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      font-size: 36px;
      margin: 0;
    }

    header p {
      color: #aaa;
      margin-top: 10px;
    }

    .order-btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff3c3c;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .gallery {
      column-count: 3;
      column-gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    @media (max-width: 800px) {
      .gallery { column-count: 2; }
    }

    @media (max-width: 500px) {
      .gallery { column-count: 1; }
    }

    .pricing {
      text-align: center;
      padding: 30px;
      background: #111;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .popup-content {
      background: white;
      color: black;
      padding: 20px;
      margin: 100px auto;
      width: 300px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <h1>Custom Portraits by Sidd 🎨</h1>
  <p>Turn your photos into stunning hand-drawn art</p>
  <button class="order-btn" onclick="openPopup()">Order Now</button>
</header>

<div class="gallery">
  <img src="https://i.postimg.cc/k6r9ksWh/IMG-20250308-073631-468-(1).webp">
  <img src="https://i.postimg.cc/cgqZVhfD/IMG-20250315-112043-791.webp">
  <img src="https://i.postimg.cc/nj8Z62qT/IMG-20250428-120626-373.webp">
  <img src="https://i.postimg.cc/vgRMph50/IMG-20250429-061323-562.webp">
  <img src="https://i.postimg.cc/5Yc1Zg85/IMG-20250525-131051-019.webp">
  <img src="https://i.postimg.cc/Vry13gXB/IMG-20250525-131051-181.webp">
  <img src="https://i.postimg.cc/vgRMph59/IMG-20250607-210459-163.webp">
  <img src="https://i.postimg.cc/2bpmPGn4/IMG-20250612-182836-030.webp">
  <img src="https://i.postimg.cc/WFRjQ80t/IMG-20250920-074457-848.webp">
</div>

<div class="pricing">
  <h2>Pricing</h2>
  <p>Basic Sketch – ₹499</p>
  <p>Detailed Portrait – ₹999</p>
  <p>Premium Artwork – ₹1499</p>
</div>

<footer>
  <p>© 2026 Sidd Artifex</p>
</footer>

<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Place Your Order</h3>
    <p>Send your photo on WhatsApp</p>
    <a href="https://wa.me/91XXXXXXXXXX">Chat Now</a>
    <br><br>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "block";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
